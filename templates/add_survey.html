{% extends "layout.html" %}

{% block title %}Add Survey{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="text-center text-success mb-4">
            Create Survey
        </h2>

        <form method="POST">

            <div class="mb-3">
                <label>Question</label>
                <input type="text"
                       name="question"
                       class="form-control"
                       required>
            </div>

            <div class="mb-3">
                <label>Option 1</label>
                <input type="text"
                       name="option1"
                       class="form-control"
                       required>
            </div>

            <div class="mb-3">
                <label>Option 2</label>
                <input type="text"
                       name="option2"
                       class="form-control"
                       required>
            </div>

            <div class="mb-3">
                <label>Option 3</label>
                <input type="text"
                       name="option3"
                       class="form-control"
                       required>
            </div>

            <div class="mb-3">
                <label>Option 4</label>
                <input type="text"
                       name="option4"
                       class="form-control"
                       required>
            </div>

            <button class="btn btn-success w-100">
                Create Survey
            </button>

        </form>

    </div>

</div>

{% endblock %}
