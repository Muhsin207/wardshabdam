{% extends "layout.html" %}

{% block title %}
Admin Reset Password
{% endblock %}

{% block content %}

<div class="report-container">

    <h2>🔑 Create New Admin Password</h2>

    <form method="POST">

        <div class="form-group">
            <label>New Password</label>
            <input
                type="password"
                name="password"
                required>
        </div>

        <div class="form-group">
            <label>Confirm Password</label>
            <input
                type="password"
                name="confirm_password"
                required>
        </div>

        <button type="submit">
            Update Password
        </button>

    </form>

</div>

{% endblock %}
