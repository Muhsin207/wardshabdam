{% extends "layout.html" %}

{% block title %}
Manage Downloads
{% endblock %}

{% block content %}

<div class="admin-container">

    <h2>📂 Manage Downloads</h2>

    <table>

        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Category</th>
            <th>Download</th>
            <th>Actions</th>
        </tr>

        {% for file in downloads %}

        <tr>

            <td>{{ file.id }}</td>

            <td>{{ file.title }}</td>

            <td>{{ file.category }}</td>

            <td>

                <a href="{{ url_for('static',
                    filename='documents/' + file.file_name) }}"
                    target="_blank"
                    class="btn-view">

                    📄 Open

                </a>

            </td>

            <td>

                <a href="/edit-download/{{ file.id }}"
                   class="btn-edit">

                    ✏ Edit

                </a>

                <a href="/delete-download/{{ file.id }}"
                   class="btn-delete">

                    🗑 Delete

                </a>

            </td>

        </tr>

        {% endfor %}

    </table>

</div>

{% endblock %}
