{% extends "layout.html" %}

{% block title %}
Downloads
{% endblock %}

{% block content %}

<div class="admin-container">

    <h2>📂 Downloads</h2>

    <form method="GET">

        <input
            type="text"
            name="search"
            placeholder="Search documents..."
            value="{{ search }}">

        <select name="category">

            <option value="">All Categories</option>

            <option value="Ward Form">Ward Form</option>

            <option value="Approval Application">
                Approval Application
            </option>

            <option value="Circular">
                Circular
            </option>

            <option value="Other">
                Other
            </option>

        </select>

        <button class="btn-add">
            Search
        </button>

    </form>

    <br>

    {% for file in downloads %}

    <div class="card">

        <h3>{{ file.title }}</h3>

        <p>
            <strong>Category:</strong>
            {{ file.category }}
        </p>

        <p>{{ file.description }}</p>

        <a
            href="{{ url_for('static',
            filename='documents/' + file.file_name) }}"
            target="_blank"
            class="btn-view">

            ⬇ Download PDF

        </a>

    </div>

    <br>

    {% endfor %}

</div>

{% endblock %}
