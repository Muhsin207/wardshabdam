{% extends "layout.html" %}

{% block title %}
Edit Download
{% endblock %}

{% block content %}

<div class="admin-container">

    <h2>✏ Edit Document</h2>

    <form method="POST">

        <label>Title</label>

        <input
            type="text"
            name="title"
            value="{{ download.title }}"
            required>

        <br><br>

        <label>Category</label>

        <select name="category">

            <option {% if download.category=="Ward Form" %}selected{% endif %}>Ward Form</option>

            <option {% if download.category=="Approval Application" %}selected{% endif %}>Approval Application</option>

            <option {% if download.category=="Circular" %}selected{% endif %}>Circular</option>

            <option {% if download.category=="Other" %}selected{% endif %}>Other</option>

        </select>

        <br><br>

        <label>Description</label>

        <textarea
            name="description"
            rows="5">{{ download.description }}</textarea>

        <br><br>

        <button class="btn-add">
            Update Document
        </button>

    </form>

</div>

{% endblock %}
