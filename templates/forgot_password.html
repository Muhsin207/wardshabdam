{% extends "layout.html" %}

{% block title %}
Forgot Password
{% endblock %}

{% block content %}

<div class="report-container">

    <h2>🔐 Forgot Password</h2>

    <form method="POST">

        <div class="form-group">
            <label>Mobile Number</label>
            <input
                type="text"
                name="mobile"
                required>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input
                type="email"
                name="email"
                required>
        </div>

        <button type="submit">
            Verify
        </button>

    </form>

</div>

{% endblock %}
