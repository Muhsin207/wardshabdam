{% extends "layout.html" %}

{% block title %}
Gallery
{% endblock %}

{% block content %}

<div class="container">

    <h2 class="page-title">
        📷 Panchayath Gallery
    </h2>
    <form method="GET" class="search-box">

    <input
        type="text"
        name="search"
        placeholder="Search gallery..."
        value="{{ request.args.get('search', '') }}">

    <button type="submit">
        🔍 Search
    </button>

    </form>

    <br>    
    <div class="gallery-grid">

        {% for photo in photos %}

        <div class="gallery-card">

            <a href="{{ url_for('static', filename='uploads/' + photo.photo) }}"
                target="_blank">

                <img src="{{ url_for('static', filename='uploads/' + photo.photo) }}"
                    alt="{{ photo.title }}">

            </a>

            <div class="gallery-content">

                <h3>{{ photo.title }}</h3>

                <p>{{ photo.description }}</p>

                <small>
                    📅 {{ photo.event_date }}
                </small>
                {% if session.get("admin_id") %}

                <a href="/admin/delete-gallery/{{ photo.id }}"
                    class="btn-delete"
                    onclick="return confirm('Delete this photo?')">

                    🗑 Delete

                </a>

                {% endif %}

            </div>

        </div>

        {% endfor %}

    </div>

</div>

{% endblock %}
