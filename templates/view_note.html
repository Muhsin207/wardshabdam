{% extends "layout.html" %}

{% block title %}
View Note
{% endblock %}

{% block content %}

<div class="container" style="max-width:800px; margin:40px auto;">

    <div class="card" style="padding:30px; border-radius:15px; box-shadow:0 5px 15px rgba(0,0,0,.1);">

        <h2>📝 കുറിപ്പിന്റെ വിശദാംശങ്ങൾ</h2>
        <p style="color:#666;">Note Details</p>

        <hr>

        <h3>{{ note["title"] }}</h3>

        <p style="white-space:pre-wrap; line-height:1.8;">
            {{ note["note"] }}
        </p>

        <hr>

        <p>
            <strong>📅 Created:</strong>
            {{ note["created_at"] }}
        </p>

        <br>

        <a href="/ward-dashboard" class="btn btn-primary">
            ⬅ Back to Dashboard
        </a>

    </div>

</div>

{% endblock %}
