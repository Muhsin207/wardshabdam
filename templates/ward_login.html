{% extends "layout.html" %}

{% block title %}
Ward Member Login
{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="text-center mb-4">
            👥 Ward Member Login
        </h2>

        <form method="POST">

            <div class="mb-3">
                <label>Username</label>
                <input
                    type="text"
                    name="username"
                    class="form-control"
                    required>
            </div>

            <div class="mb-3">
                <label>Password</label>
                <input
                    type="password"
                    name="password"
                    class="form-control"
                    required>
            </div>

            <button class="btn btn-success w-100">
                Login
            </button>

        </form>

    </div>

</div>

{% endblock %}
